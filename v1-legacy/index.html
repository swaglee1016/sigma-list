<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sigma List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600&family=PT+Serif:wght@400;700&family=Inter:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F4EFE6;
    --paper-light: #FBF8F2;
    --paper-border: #E0D9CC;
    --ink: #2B2B2B;
    --ink-soft: #4A4540;
    --ink-mute: #8A8278;

    --q-ue: #D9613C; /* Q1 - Urgent & Important (Do First) */
    --q-un: #87A89E; /* Q2 - Important but not urgent (Schedule) */
    --q-ne: #6B8B96; /* Q3 - Urgent but not Important (Delegate) */
    --q-nn: #696969; /* Q4 - Not Urgent & Not Important (Delete) */

    --accent: #D95333;
    --radius: 0px;
    --font-display: 'PT Serif', 'Noto Serif SC', serif;
    --font-condensed: 'Oswald', 'Noto Sans SC', sans-serif;
    --font-body: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ===== Nav — Clean paper header ===== */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; height: 56px;
    background: var(--paper);
    border-bottom: 2px solid var(--paper-border);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .nav-title {
    font-family: var(--font-display);
    font-size: 24px; font-weight: 400; letter-spacing: 1px;
    color: var(--ink);
  }
  .nav-title span { color: var(--accent); }
  .nav-tabs { display: flex; gap: 0; }
  .nav-tab {
    padding: 10px 28px; border: none; border-bottom: 3px solid transparent;
    background: transparent; color: var(--ink-mute); cursor: pointer;
    font-size: 12px; font-weight: 600; font-family: var(--font-body);
    transition: all 0.15s; letter-spacing: 1px; text-transform: uppercase;
  }
  .nav-tab:hover { color: var(--ink); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .container { max-width: 1500px; margin: 72px auto 24px; padding: 0 24px; position: relative; z-index: 1; }

  /* ===== Matrix ===== */
  .matrix-wrap {
    min-height: calc(100vh - 112px);
    display: flex; flex-direction: column;
  }

  .matrix-board {
    flex: 1; position: relative;
    display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
    margin: 110px 60px 30px;
  }

  /* Cross-axis thin charcoal lines */
  .matrix-board::before {
    content: ''; position: absolute; left: 50%; top: 0; bottom: 0;
    width: 2px; background: var(--ink); z-index: 5; transform: translateX(-50%);
  }
  .matrix-board::after {
    content: ''; position: absolute; top: 50%; left: 0; right: 0;
    height: 2px; background: var(--ink); z-index: 5; transform: translateY(-50%);
  }

  /* Header inside matrix — The EISENHOWER MATRIX */
  .matrix-header {
    position: absolute; top: -95px; left: 0; right: 0;
    text-align: left; z-index: 10; padding-left: 4px;
  }
  .matrix-header .h-the {
    font-family: var(--font-display); font-style: normal; font-weight: 400;
    font-size: 32px; color: var(--accent); line-height: 1; margin-bottom: 4px;
  }
  .matrix-header .h-title {
    font-family: var(--font-condensed); font-size: 56px; font-weight: 500;
    letter-spacing: 2px; text-transform: uppercase; color: var(--ink); line-height: 1;
  }
  .matrix-header .h-dots {
    margin-top: 10px; font-size: 0;
    border-bottom: 1px dashed rgba(43,43,43,0.3);
  }
  .matrix-header .h-dots::after { content: ''; }

  .zone { display: flex; flex-direction: column; position: relative; overflow: hidden; }

  .zone-label {
    position: absolute; top: 0; left: 0; right: 0; z-index: 4;
    padding: 22px 26px 12px;
    font-family: var(--font-display); font-size: 22px; letter-spacing: 0;
    font-weight: 400; text-transform: none; line-height: 1.2;
    display: flex; flex-direction: column; align-items: flex-start; gap: 0;
    pointer-events: none;
    color: var(--ink);
  }
  .zone-label .q-main { display: block; }
  .zone-label .q-sub {
    font-family: var(--font-display); font-size: 22px; font-weight: 400;
    letter-spacing: 0; text-transform: none; opacity: 1; color: var(--ink);
    line-height: 1.2;
  }
  .zone-label .q-count {
    position: absolute; top: 22px; right: 26px;
    font-family: var(--font-body); font-size: 11px; font-weight: 600;
    letter-spacing: 0; opacity: 0.5; color: var(--ink);
  }

  /* Q3 — Urgent but not Important — all caps per reference */
  .z-nn .zone-label { text-transform: uppercase; font-size: 20px; letter-spacing: 0.5px; }
  .z-nn .zone-label .q-sub { text-transform: uppercase; font-size: 20px; letter-spacing: 0.5px; }

  .zone-body {
    flex: 1; overflow-y: auto; padding: 100px 22px 4px;
  }
  .zone-body::-webkit-scrollbar { width: 5px; }
  .zone-body::-webkit-scrollbar-track { background: transparent; }
  .zone-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; }

  /* Zone colors — full background fill */
  .z-un { background: var(--q-ue); }
  .z-un .zone-body { background: transparent; }
  .z-un .add-form { background: rgba(0,0,0,0.08); border-top: 1px solid rgba(255,255,255,0.18); }
  .z-un .add-input, .z-un .add-tips { color: #fff; background: transparent; }
  .z-un .add-input::placeholder, .z-un .add-tips::placeholder { color: rgba(255,255,255,0.55); }

  .z-ue { background: var(--q-un); }
  .z-ue .zone-body { background: transparent; }
  .z-ue .add-form { background: rgba(0,0,0,0.08); border-top: 1px solid rgba(255,255,255,0.18); }
  .z-ue .add-input, .z-ue .add-tips { color: #fff; background: transparent; }
  .z-ue .add-input::placeholder, .z-ue .add-tips::placeholder { color: rgba(255,255,255,0.55); }

  .z-nn { background: var(--q-ne); }
  .z-nn .zone-body { background: transparent; }
  .z-nn .add-form { background: rgba(0,0,0,0.08); border-top: 1px solid rgba(255,255,255,0.18); }
  .z-nn .add-input, .z-nn .add-tips { color: #fff; background: transparent; }
  .z-nn .add-input::placeholder, .z-nn .add-tips::placeholder { color: rgba(255,255,255,0.55); }

  .z-ne { background: var(--q-nn); }
  .z-ne .zone-body { background: transparent; }
  .z-ne .add-form { background: rgba(0,0,0,0.08); border-top: 1px solid rgba(255,255,255,0.18); }
  .z-ne .add-input, .z-ne .add-tips { color: #fff; background: transparent; }
  .z-ne .add-input::placeholder, .z-ne .add-tips::placeholder { color: rgba(255,255,255,0.55); }

  /* Add form — two-field inline */
  .add-form { display: flex; gap: 10px; padding: 10px 18px 13px; align-items: center; }
  .add-input {
    flex: 1; padding: 8px 10px; border: none; border-bottom: 1px solid rgba(255,255,255,0.45);
    font-size: 13px; outline: none; transition: all 0.15s; font-family: var(--font-body);
    font-weight: 300; min-width: 0;
  }
  .add-input:focus { border-bottom-color: #fff; }
  .add-input:disabled { opacity: 0.3; cursor: not-allowed; }
  .add-tips {
    flex: 2; padding: 8px 10px; border: none; border-bottom: 1px solid rgba(255,255,255,0.3);
    font-size: 12px; outline: none; transition: all 0.15s; font-family: var(--font-body);
    font-weight: 300; min-width: 0; font-style: italic;
  }
  .add-tips:focus { border-bottom-color: #fff; }

  /* Items — white text with bullet dots */
  .item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 16px; margin-bottom: 1px;
    transition: opacity 0.1s; cursor: grab;
    animation: fadeIn 0.2s ease both;
    color: #fff; font-size: 13px; line-height: 1.5; font-weight: 300;
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .item:active { cursor: grabbing; opacity: 0.6; }
  .item.dragging { opacity: 0.3; }
  .item.drag-over { border-bottom: 2px solid rgba(255,255,255,0.5); }
  .item.done { opacity: 0.35; }
  .item.done .item-text { text-decoration: line-through; text-decoration-color: rgba(255,255,255,0.5); text-decoration-thickness: 1px; }
  .item-bullet {
    width: 6px; height: 6px; border-radius: 50%; background: #fff; flex-shrink: 0;
  }
  .item.done .item-bullet { background: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.4); }

  /* Bottom quadrants — open circle bullets */
  .z-nn .item-bullet, .z-ne .item-bullet {
    background: transparent; border: 1.5px solid #fff; width: 7px; height: 7px;
  }
  .z-nn .item.done .item-bullet, .z-ne .item.done .item-bullet {
    background: rgba(255,255,255,0.3); border-color: rgba(255,255,255,0.3);
  }
  .item-text { flex: 1; word-break: break-word; }
  .item-tip-mark {
    font-size: 10px; opacity: 0.6; flex-shrink: 0; margin-right: 2px;
  }
  .item-check {
    width: 22px; height: 22px; border: none;
    background: transparent; color: rgba(255,255,255,0.55); cursor: pointer; flex-shrink: 0;
    font-size: 14px; font-weight: 600; transition: all 0.1s;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; border-radius: 50%;
  }
  .item:hover .item-check { opacity: 1; }
  .item-check:hover { background: rgba(255,255,255,0.2); color: #fff; }

  .empty-msg {
    text-align: center; padding: 42px 16px; color: rgba(255,255,255,0.45);
    font-size: 11px; line-height: 1.8; letter-spacing: 0.5px;
    font-family: var(--font-body); text-transform: uppercase;
  }

  .fold-divider {
    margin: 8px 16px; padding: 5px 10px; font-size: 10px; color: rgba(255,255,255,0.5);
    text-align: center; cursor: pointer; user-select: none; letter-spacing: 1px;
    font-weight: 600; text-transform: uppercase;
    border-top: 1px dashed rgba(255,255,255,0.25);
  }
  .fold-divider:hover { color: rgba(255,255,255,0.8); }

  /* ===== List View ===== */
  .list-view-wrap { display: none; max-width: 720px; margin: 0 auto; }
  .list-view-wrap.visible { display: block; }

  .list-item {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 16px; margin-bottom: 2px;
    background: var(--paper-light); cursor: pointer;
    border: 1px solid var(--paper-border); border-left: 5px solid var(--paper-border);
    transition: all 0.1s;
    animation: fadeIn 0.2s ease both;
  }
  .list-item:hover { background: #EDE6D8; }
  .list-item:hover .li-check, .list-item:hover .li-del { opacity: 1; }
  .list-item.done { opacity: 0.55; }
  .list-item.done .li-text { text-decoration: line-through; text-decoration-thickness: 1px; }
  .list-item .li-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
  .list-item .li-text {
    font-size: 13px; color: var(--ink); line-height: 1.4; word-break: break-word;
  }
  .list-item .li-tips {
    font-size: 11px; color: var(--ink-mute); line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; text-overflow: ellipsis;
  }
  .list-item .item-qtag {
    font-size: 9px; padding: 3px 8px; letter-spacing: 1px;
    color: #fff; flex-shrink: 0; font-weight: 700; min-width: 36px;
    text-align: center; text-transform: uppercase;
  }
  .list-item .item-time {
    font-family: var(--font-body); font-size: 10px; color: var(--ink-mute);
    letter-spacing: 0.3px; flex-shrink: 0; white-space: nowrap;
  }
  .list-item .li-check, .list-item .li-del {
    width: 26px; height: 26px; border: none; background: transparent;
    cursor: pointer; flex-shrink: 0; transition: all 0.1s; opacity: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600; border-radius: 50%;
  }
  .list-item .li-check { color: var(--ink-mute); }
  .list-item .li-check:hover { background: #87A89E; color: #fff; }
  .list-item .li-del { color: var(--ink-mute); font-size: 16px; font-weight: 400; }
  .list-item .li-del:hover { background: #c41e1e; color: #fff; }
  .list-empty {
    text-align: center; padding: 80px 40px;
    font-family: var(--font-display); font-size: 18px;
    color: var(--ink-mute); letter-spacing: 3px; text-transform: uppercase;
  }

  /* ===== Notes View ===== */
  .notes-wrap { display: none; }
  .notes-wrap.visible { display: block; }

  .notes-add-bar {
    background: var(--paper-light); padding: 18px 22px;
    margin-bottom: 24px; border: 1px solid var(--paper-border);
    display: flex; gap: 10px; align-items: flex-end;
  }
  .notes-add-bar .fields { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .notes-add-bar input {
    padding: 10px 14px; border: 1px solid var(--paper-border); font-size: 13px;
    outline: none; transition: border-color 0.15s; font-family: var(--font-body);
    background: #fff; color: var(--ink);
  }
  .notes-add-bar input:focus { border-color: var(--accent); }
  .notes-add-bar input::placeholder { color: var(--ink-mute); }
  .notes-add-bar button {
    padding: 10px 32px; background: var(--accent); color: #fff; border: none;
    font-size: 14px; font-weight: 600; cursor: pointer; letter-spacing: 1px;
    transition: all 0.1s; font-family: var(--font-body); text-transform: uppercase;
  }
  .notes-add-bar button:hover { background: #C1442A; }

  .notes-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 16px;
  }
  .note-card {
    background: var(--paper-light); padding: 20px 22px; cursor: pointer;
    transition: all 0.15s; border: 1px solid var(--paper-border);
    position: relative; border-left: 4px solid var(--accent);
    animation: fadeIn 0.25s ease both;
  }
  .note-card:hover { background: #EDE6D8; }
  .note-card .note-title {
    font-family: var(--font-display); font-size: 17px; font-weight: 400;
    letter-spacing: 0.5px; margin-bottom: 8px; color: var(--ink); line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .note-card .note-body-preview {
    font-size: 12px; color: var(--ink-soft); line-height: 1.6;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    white-space: pre-wrap;
  }
  .note-card .note-meta {
    margin-top: 12px; font-size: 10px; color: var(--ink-mute); letter-spacing: 0.5px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .note-card .note-del {
    width: 28px; height: 28px; border: none;
    background: transparent; color: var(--ink-mute); cursor: pointer;
    font-size: 18px; font-weight: 400; display: flex; align-items: center; justify-content: center;
    position: absolute; top: 12px; right: 12px; opacity: 0; transition: all 0.1s;
  }
  .note-card:hover .note-del { opacity: 1; }
  .note-card .note-del:hover { background: #c41e1e; color: #fff; border-radius: 50%; }
  .notes-empty {
    text-align: center; padding: 80px 40px;
    font-family: var(--font-display); font-size: 16px;
    color: var(--ink-mute); letter-spacing: 2px; text-transform: uppercase; line-height: 2;
  }

  /* ===== Modal ===== */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    z-index: 200; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--paper-light); padding: 28px; width: 540px;
    max-width: 92vw; max-height: 85vh; display: flex; flex-direction: column; gap: 14px;
    border: 1px solid var(--paper-border);
    animation: fadeIn 0.2s ease;
  }
  .modal input {
    padding: 12px 16px; border: 1px solid var(--paper-border); font-family: var(--font-display);
    font-size: 18px; font-weight: 400; outline: none; letter-spacing: 0.5px;
    background: #fff; color: var(--ink);
  }
  .modal input:focus { border-color: var(--accent); }
  .modal textarea {
    flex: 1; padding: 14px 16px; border: 1px solid var(--paper-border);
    font-size: 13px; line-height: 1.7; resize: vertical; min-height: 180px; outline: none;
    font-family: var(--font-body); background: #fff; color: var(--ink);
  }
  #taskModal textarea { min-height: 120px; }
  .modal textarea:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-actions button {
    padding: 10px 24px; border: 1px solid var(--paper-border); background: var(--paper);
    font-family: var(--font-body); font-size: 12px; cursor: pointer; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase; transition: all 0.1s; color: var(--ink);
  }
  .modal-actions button:hover { background: #EDE6D8; }
  .modal-actions button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .modal-actions button.primary:hover { background: #C1442A; }
  .modal-actions button.danger { color: #c41e1e; border-color: #c41e1e; background: #fff; }
  .modal-actions button.danger:hover { background: #c41e1e; color: #fff; }

  /* Task modal */
  .task-modal { padding: 0; overflow: hidden; gap: 0; }
  .tm-header {
    padding: 18px 24px 14px; font-family: var(--font-body);
    font-size: 13px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: #fff;
  }
  .tm-body {
    padding: 20px 24px 16px; display: flex; flex-direction: column; gap: 12px;
  }
  .tm-label {
    font-family: var(--font-body); font-size: 10px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; color: var(--ink-mute);
  }
  .task-modal input {
    padding: 10px 0; border: none; border-bottom: 2px solid var(--paper-border);
    font-family: var(--font-body); font-size: 16px; font-weight: 400;
    background: transparent; color: var(--ink); letter-spacing: 0;
  }
  .task-modal input:focus { border-bottom-color: var(--accent); }
  .task-modal textarea {
    padding: 10px 0; border: none; border-bottom: 2px solid var(--paper-border);
    font-size: 13px; line-height: 1.6; min-height: 100px;
    font-family: var(--font-body); background: transparent; color: var(--ink);
    resize: vertical;
  }
  .task-modal textarea:focus { border-bottom-color: var(--accent); }
  .tm-meta {
    padding: 0 24px 6px; font-size: 10px; color: var(--ink-mute);
    font-family: var(--font-body);
  }
  .tm-actions { padding: 14px 24px; border-top: 1px solid var(--paper-border); }
  .tm-actions .danger { display: none; }
  .tm-actions .danger.show { display: inline-block; }

  /* List view section heads */
  .list-section-head {
    font-family: var(--font-display); font-size: 18px;
    color: var(--ink); margin: 24px 0 12px; padding-bottom: 8px;
    border-bottom: 1px solid var(--paper-border);
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .list-section-head:first-child { margin-top: 0; }
  .list-section-head .lsh-count {
    font-family: var(--font-body); font-size: 11px; font-weight: 600;
    color: var(--ink-mute); letter-spacing: 1px;
  }

  @media (max-width: 900px) {
    .matrix-board { grid-template-columns: 1fr; grid-template-rows: auto; height: auto; margin: 24px 28px; }
    .zone { min-height: 280px; }
    .notes-grid { grid-template-columns: 1fr; }
    .notes-add-bar { flex-direction: column; }
    .notes-add-bar button { width: 100%; }
    .nav { padding: 0 16px; }
    .nav-title { font-size: 20px; }
    .nav-tab { padding: 8px 16px; font-size: 10px; }
    .add-form { flex-direction: column; gap: 4px; }
    .add-input, .add-tips { flex: auto; width: 100%; }
  }
</style>
</head>
<body>

<!-- Nav — Steel header -->
<div class="nav">
  <div class="nav-title">&Sigma; <span>List</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-view="matrix" onclick="switchView('matrix')">Matrix</button>
    <button class="nav-tab" data-view="list" onclick="switchView('list')">List</button>
    <button class="nav-tab" data-view="notes" onclick="switchView('notes')">Notes</button>
  </div>
</div>

<div class="container">

  <!-- Matrix View -->
  <div id="matrixView" class="matrix-wrap">
    <div class="matrix-board">
      <div class="matrix-header">
        <div class="h-the">The</div>
        <div class="h-title">Eisenhower Matrix</div>
        <div class="h-dots"></div>
      </div>
      <div class="zone z-un" data-q="un">
        <div class="zone-label"><span class="q-main">Urgent &amp; important</span><span class="q-sub">(Do first)</span><span class="q-count" id="cnt-un">0</span></div>
        <div class="zone-body" id="body-un" ondragover="handleDragOver(event)" ondrop="handleDrop(event, 'un')"></div>
        <form class="add-form" onsubmit="addItem(event, 'un')">
          <input class="add-input" id="inp-un" placeholder="Task name" maxlength="200" autocomplete="off">
          <input class="add-tips" id="tips-un" placeholder="Tips..." maxlength="500" autocomplete="off">
          <button type="submit" style="display:none"></button>
        </form>
      </div>

      <div class="zone z-ue" data-q="ue">
        <div class="zone-label"><span class="q-main">Important</span><span class="q-sub">but not urgent (schedule)</span><span class="q-count" id="cnt-ue">0</span></div>
        <div class="zone-body" id="body-ue" ondragover="handleDragOver(event)" ondrop="handleDrop(event, 'ue')"></div>
        <form class="add-form" onsubmit="addItem(event, 'ue')">
          <input class="add-input" id="inp-ue" placeholder="Task name" maxlength="200" autocomplete="off">
          <input class="add-tips" id="tips-ue" placeholder="Tips..." maxlength="500" autocomplete="off">
          <button type="submit" style="display:none"></button>
        </form>
      </div>

      <div class="zone z-nn" data-q="nn">
        <div class="zone-label"><span class="q-main">URGENT BUT NOT</span><span class="q-sub">IMPORTANT</span><span class="q-count" id="cnt-nn">0</span></div>
        <div class="zone-body" id="body-nn" ondragover="handleDragOver(event)" ondrop="handleDrop(event, 'nn')"></div>
        <form class="add-form" onsubmit="addItem(event, 'nn')">
          <input class="add-input" id="inp-nn" placeholder="Task name" maxlength="200" autocomplete="off">
          <input class="add-tips" id="tips-nn" placeholder="Tips..." maxlength="500" autocomplete="off">
          <button type="submit" style="display:none"></button>
        </form>
      </div>

      <div class="zone z-ne" data-q="ne">
        <div class="zone-label"><span class="q-main">Not Urgent &amp; Not</span><span class="q-sub">Important</span><span class="q-count" id="cnt-ne">0</span></div>
        <div class="zone-body" id="body-ne" ondragover="handleDragOver(event)" ondrop="handleDrop(event, 'ne')"></div>
        <form class="add-form" onsubmit="addItem(event, 'ne')">
          <input class="add-input" id="inp-ne" placeholder="Task name" maxlength="200" autocomplete="off">
          <input class="add-tips" id="tips-ne" placeholder="Tips..." maxlength="500" autocomplete="off">
          <button type="submit" style="display:none"></button>
        </form>
      </div>
    </div>
  </div>

  <!-- List View -->
  <div id="listView" class="list-view-wrap"></div>

  <!-- Notes View -->
  <div id="notesView" class="notes-wrap">
    <div class="notes-add-bar">
      <div class="fields">
        <input id="noteTitle" placeholder="Title (optional)" maxlength="100">
        <input id="noteBody" placeholder="Write something..." maxlength="5000">
      </div>
      <button onclick="addNote()">Save</button>
    </div>
    <div class="notes-grid" id="notesGrid"></div>
    <div class="notes-empty" id="notesEmpty">No notes yet<br>Write down your thoughts</div>
  </div>
</div>

<!-- Note Edit Modal -->
<div class="modal-overlay" id="noteModal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <input id="modalTitle" placeholder="Title (optional)" maxlength="100">
    <textarea id="modalBody" placeholder="Write something..."></textarea>
    <div class="modal-actions">
      <button class="danger" onclick="deleteNoteFromModal()">Delete</button>
      <button onclick="closeModal()">Cancel</button>
      <button class="primary" onclick="saveNoteFromModal()">Save</button>
    </div>
  </div>
</div>

<!-- Task Modal -->
<div class="modal-overlay" id="taskModal" onclick="if(event.target===this)closeTaskModal()">
  <div class="modal task-modal">
    <div class="tm-header" id="taskModalQuadrant"></div>
    <div class="tm-body">
      <label class="tm-label">Task</label>
      <input id="taskModalTitle" placeholder="What needs to be done?" maxlength="200">
      <label class="tm-label">Tips &amp; notes</label>
      <textarea id="taskModalTips" placeholder="Things to watch out for, reminders, context..." maxlength="2000"></textarea>
    </div>
    <div class="tm-meta" id="taskModalMeta"></div>
    <div class="modal-actions tm-actions">
      <button class="danger" id="taskModalDelete" onclick="deleteTaskFromModal()">Delete</button>
      <button onclick="closeTaskModal()">Cancel</button>
      <button class="primary" onclick="saveTaskFromModal()">Save</button>
    </div>
  </div>
</div>

<script>
const QS = [
  { id:'un', label:'Urgent & Important', color:'#D9613C', tag:'Do First' },
  { id:'ue', label:'Important but not Urgent', color:'#87A89E', tag:'Schedule' },
  { id:'nn', label:'Urgent but not Important', color:'#6B8B96', tag:'Delegate' },
  { id:'ne', label:'Not Urgent & Not Important', color:'#696969', tag:'Delete' },
];
const MAX = 133;

let tasks = load('sigma-list-data') || { un:[], ue:[], nn:[], ne:[] };
let notes = load('sigma-notes-data') || [];
let editingNoteId = null;
let editingTask = null; // { q, id } when editing existing, { q, id:null } when creating

// Migrate old items missing tips/updatedAt
for (const q of ['un','ue','nn','ne']) {
  (tasks[q] || []).forEach(t => {
    if (t.tips === undefined) t.tips = '';
    if (t.updatedAt === undefined) t.updatedAt = t.ts || Date.now();
  });
}

function load(key) {
  try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch(e) { return null; }
}
function saveTasks() { localStorage.setItem('sigma-list-data', JSON.stringify(tasks)); }
function saveNotes() { localStorage.setItem('sigma-notes-data', JSON.stringify(notes)); }

function openTaskModal(q, id) {
  editingTask = { q, id: id || null };
  const qInfo = QS.find(x => x.id === q);
  const header = document.getElementById('taskModalQuadrant');
  header.textContent = qInfo.label + ' · ' + qInfo.tag;
  header.style.background = qInfo.color;
  const titleEl = document.getElementById('taskModalTitle');
  const tipsEl = document.getElementById('taskModalTips');
  const delBtn = document.getElementById('taskModalDelete');
  const metaEl = document.getElementById('taskModalMeta');
  if (id) {
    const t = tasks[q].find(i => i.id === id);
    if (!t) return;
    titleEl.value = t.text;
    tipsEl.value = t.tips || '';
    delBtn.classList.add('show');
    if (metaEl) metaEl.textContent = 'Created ' + fmtTime(t.ts) + ' · Updated ' + fmtTime(t.updatedAt || t.ts);
  } else {
    if (tasks[q].length >= MAX) { alert('Quadrant is full'); editingTask = null; return; }
    titleEl.value = '';
    tipsEl.value = '';
    delBtn.classList.remove('show');
    if (metaEl) metaEl.textContent = '';
  }
  document.getElementById('taskModal').classList.add('open');
  setTimeout(() => titleEl.focus(), 50);
}

function closeTaskModal() {
  document.getElementById('taskModal').classList.remove('open');
  editingTask = null;
}

function saveTaskFromModal() {
  if (!editingTask) return;
  const text = document.getElementById('taskModalTitle').value.trim();
  const tips = document.getElementById('taskModalTips').value.trim();
  if (!text) return;
  const { q, id } = editingTask;
  if (id) {
    const t = tasks[q].find(i => i.id === id);
    if (t) { t.text = text; t.tips = tips; t.updatedAt = Date.now(); }
  } else {
    if (tasks[q].length >= MAX) return;
    const now = Date.now();
    tasks[q].push({ id: uid(), text, tips, done: false, ts: now, updatedAt: now });
  }
  saveTasks();
  renderMatrix();
  renderList();
  closeTaskModal();
}

function deleteTaskFromModal() {
  if (!editingTask || !editingTask.id) return;
  const { q, id } = editingTask;
  tasks[q] = tasks[q].filter(i => i.id !== id);
  saveTasks();
  renderMatrix();
  renderList();
  closeTaskModal();
}

function toggleDone(q, id) {
  const item = tasks[q].find(i => i.id === id);
  if (item) {
    item.done = !item.done;
    item.updatedAt = Date.now();
    saveTasks(); renderMatrix(); renderList();
  }
}

function addItem(e, q) {
  e.preventDefault();
  const inp = document.getElementById('inp-' + q);
  const tipsEl = document.getElementById('tips-' + q);
  const text = inp.value.trim();
  const tips = tipsEl ? tipsEl.value.trim() : '';
  if (!text && !tips) return;
  if (tasks[q].length >= MAX) return;
  const now = Date.now();
  tasks[q].push({ id: uid(), text: text || 'Untitled', tips, done: false, ts: now, updatedAt: now });
  inp.value = '';
  if (tipsEl) tipsEl.value = '';
  saveTasks();
  renderMatrix();
  renderList();
  inp.focus();
}

function deleteTask(q, id) {
  tasks[q] = tasks[q].filter(i => i.id !== id);
  saveTasks();
  renderMatrix();
  renderList();
}

function renderMatrix() {
  for (const q of QS) {
    const body = document.getElementById('body-' + q.id);
    const cnt = document.getElementById('cnt-' + q.id);
    const inp = document.getElementById('inp-' + q.id);
    const tipsInp = document.getElementById('tips-' + q.id);
    const active = tasks[q.id].filter(i => !i.done);
    cnt.textContent = active.length;
    if (inp) {
      const full = tasks[q.id].length >= MAX;
      inp.disabled = full;
      inp.placeholder = full ? 'Full' : 'Task name';
      if (tipsInp) { tipsInp.disabled = full; tipsInp.placeholder = full ? 'Full' : 'Tips...'; }
    }

    if (active.length === 0) {
      const msgs = { un:'Urgent & important — do first', ue:'Important but not urgent — schedule it', nn:'Urgent but not important — delegate', ne:'Not urgent & not important — delete or avoid' };
      body.innerHTML = '<div class="empty-msg">' + msgs[q.id] + '</div>';
      continue;
    }

    let html = '';
    active.forEach(item => { html += itemRow(q.id, item); });
    body.innerHTML = html;
  }
}

function itemRow(qId, item) {
  const tipMark = item.tips ? '<span class="item-tip-mark" title="Has tips">●</span>' : '';
  return `<div class="item" draggable="true"
    data-id="${item.id}" data-q="${qId}"
    ondragstart="handleDragStart(event)" ondragend="handleDragEnd(event)">
    <div class="item-bullet"></div>
    <span class="item-text" onclick="openTaskModal('${qId}',${item.id})">${esc(item.text)}${tipMark ? ' ' + tipMark : ''}</span>
    <button class="item-check" onclick="event.stopPropagation();toggleDone('${qId}',${item.id})" title="Mark done">&#10003;</button>
  </div>`;
}

// Drag & Drop
let dragItem = null;

function handleDragStart(e) {
  dragItem = { id: +e.target.dataset.id, q: e.target.dataset.q };
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function handleDragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  dragItem = null;
}

function handleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function handleDrop(e, targetQ) {
  e.preventDefault();
  if (!dragItem) return;
  const { id, q: srcQ } = dragItem;
  if (srcQ !== targetQ) return;

  const items = tasks[targetQ];
  const srcIdx = items.findIndex(i => i.id === id);
  if (srcIdx === -1) return;

  const body = document.getElementById('body-' + targetQ);
  const children = [...body.querySelectorAll('.item[draggable]')];
  const target = children.find(c => c === e.target.closest('.item'));
  if (!target || target.dataset.id === String(id)) return;

  const dstIdx = items.findIndex(i => i.id === +target.dataset.id);
  if (dstIdx === -1) return;

  const [moved] = items.splice(srcIdx, 1);
  items.splice(dstIdx, 0, moved);
  saveTasks();
  renderMatrix();
  renderList();
}

// List View — Active on top, Done below, both sorted by updatedAt desc
function renderList() {
  const c = document.getElementById('listView');
  const active = [], done = [];
  for (const q of QS) {
    tasks[q.id].forEach(item => {
      const row = { ...item, qId: q.id, qLabel: q.label, qColor: q.color, qTag: q.tag };
      (item.done ? done : active).push(row);
    });
  }
  active.sort((a,b) => (b.updatedAt||b.ts) - (a.updatedAt||a.ts));
  done.sort((a,b) => (b.updatedAt||b.ts) - (a.updatedAt||a.ts));

  if (!active.length && !done.length) {
    c.innerHTML = '<div class="list-empty">No tasks yet</div>';
    return;
  }

  let html = '';
  html += `<div class="list-section-head"><span>Active</span><span class="lsh-count">${active.length}</span></div>`;
  html += active.length ? active.map(listRow).join('') : '<div class="list-empty" style="padding:24px 0">Nothing active</div>';
  html += `<div class="list-section-head"><span>Done</span><span class="lsh-count">${done.length}</span></div>`;
  html += done.length ? done.map(listRow).join('') : '<div class="list-empty" style="padding:24px 0">Nothing done yet</div>';
  c.innerHTML = html;
}

function listRow(item) {
  const cls = item.done ? 'list-item done' : 'list-item';
  const t = item.updatedAt || item.ts;
  const tipsHtml = item.tips ? `<div class="li-tips">${esc(item.tips)}</div>` : '';
  const checkIcon = item.done ? '&#8634;' : '&#10003;';
  const checkTitle = item.done ? 'Reopen' : 'Mark done';
  return `<div class="${cls}" style="border-left-color:${item.qColor}">
    <span class="item-qtag" style="background:${item.qColor}">${item.qTag}</span>
    <div class="li-body" onclick="openTaskModal('${item.qId}',${item.id})">
      <div class="li-text">${esc(item.text)}</div>
      ${tipsHtml}
    </div>
    <span class="item-time">${fmtTime(t)}</span>
    <button class="li-check" onclick="event.stopPropagation();toggleDone('${item.qId}',${item.id})" title="${checkTitle}">${checkIcon}</button>
    <button class="li-del" onclick="event.stopPropagation();deleteTask('${item.qId}',${item.id})" title="Delete">&times;</button>
  </div>`;
}

// Notes
function addNote() {
  const titleEl = document.getElementById('noteTitle');
  const bodyEl = document.getElementById('noteBody');
  const title = titleEl.value.trim();
  const body = bodyEl.value.trim();
  if (!title && !body) return;
  notes.unshift({ id: uid(), title: title || 'Untitled', body, ts: Date.now() });
  titleEl.value = '';
  bodyEl.value = '';
  saveNotes();
  renderNotes();
}

function openNote(id) {
  const note = notes.find(n => n.id === id);
  if (!note) return;
  editingNoteId = id;
  document.getElementById('modalTitle').value = note.title === 'Untitled' ? '' : note.title;
  document.getElementById('modalBody').value = note.body;
  document.getElementById('noteModal').classList.add('open');
}

function closeModal() {
  document.getElementById('noteModal').classList.remove('open');
  editingNoteId = null;
}

function saveNoteFromModal() {
  if (!editingNoteId) return;
  const note = notes.find(n => n.id === editingNoteId);
  if (!note) return;
  const title = document.getElementById('modalTitle').value.trim();
  note.title = title || 'Untitled';
  note.body = document.getElementById('modalBody').value;
  saveNotes();
  renderNotes();
  closeModal();
}

function deleteNoteFromModal() {
  if (!editingNoteId) return;
  notes = notes.filter(n => n.id !== editingNoteId);
  saveNotes();
  renderNotes();
  closeModal();
}

function deleteNote(e, id) {
  e.stopPropagation();
  notes = notes.filter(n => n.id !== id);
  saveNotes();
  renderNotes();
}

function renderNotes() {
  const grid = document.getElementById('notesGrid');
  const empty = document.getElementById('notesEmpty');
  if (notes.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = notes.map(n => `
    <div class="note-card" onclick="openNote(${n.id})">
      <button class="note-del" onclick="deleteNote(event,${n.id})">&times;</button>
      <div class="note-title">${esc(n.title)}</div>
      <div class="note-body-preview">${esc(n.body)}</div>
      <div class="note-meta"><span>${fmtTime(n.ts)}</span></div>
    </div>
  `).join('');
}

// Nav
function switchView(view) {
  document.getElementById('matrixView').style.display = view === 'matrix' ? 'flex' : 'none';
  document.getElementById('listView').style.display = view === 'list' ? 'block' : 'none';
  document.getElementById('listView').classList.toggle('visible', view === 'list');
  document.getElementById('notesView').style.display = view === 'notes' ? 'block' : 'none';
  document.getElementById('notesView').classList.toggle('visible', view === 'notes');
  document.querySelectorAll('.nav-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.view === view);
  });
  if (view === 'list') renderList();
  if (view === 'notes') renderNotes();
}

// Utils
function uid() { return Math.floor(Date.now() * 1000 + Math.random() * 1000); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  if (diff < 7*86400000) return Math.floor(diff/86400000) + 'd ago';
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());
}
function pad(n) { return n < 10 ? '0'+n : n; }

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (document.getElementById('taskModal').classList.contains('open')) closeTaskModal();
    else if (document.getElementById('noteModal').classList.contains('open')) closeModal();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    if (document.getElementById('taskModal').classList.contains('open')) {
      e.preventDefault(); saveTaskFromModal();
    } else if (document.getElementById('noteModal').classList.contains('open')) {
      e.preventDefault(); saveNoteFromModal();
    }
  }
});

renderMatrix();
renderNotes();
</script>

</body>
</html>
